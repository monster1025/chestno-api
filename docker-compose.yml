services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chestny-znak-backend
    ports:
      - "3002:3001"
    env_file:
      - ./backend/.env
    volumes:
      - ./plans:/app/plans:ro
    networks:
      - chestny-znak-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chestny-znak-frontend
    ports:
      - "3003:80"
    depends_on:
      - backend
    networks:
      - chestny-znak-net

networks:
  chestny-znak-net:
    driver: bridge
